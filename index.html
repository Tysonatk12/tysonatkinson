<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyson Atkinson · Cybersecurity Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #050810;
    --bg2: #080d1a;
    --bg3: #0c1221;
    --surface: #0f1728;
    --surface2: #141e33;
    --border: rgba(0,200,255,0.12);
    --border2: rgba(0,200,255,0.06);
    --cyan: #00c8ff;
    --cyan2: #00e5ff;
    --green: #00ff88;
    --red: #ff3860;
    --yellow: #ffcc00;
    --text: #c8d8f0;
    --text2: #7a90b8;
    --text3: #3d5070;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
  }

  section { padding: 100px 40px; max-width: 1100px; margin: auto; }

  .btn {
    display: inline-flex;
    padding: 10px 18px;
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
  }

  .btn-primary {
    background: var(--cyan);
    color: #000;
    border: none;
    font-weight: 700;
  }

  .sec-header { margin-bottom: 40px; }
  .sec-num { color: var(--cyan); font-size: 11px; letter-spacing: .2em; }
  h2 { font-family: var(--font-display); color: #fff; margin-top: 10px; }
  .dim { color: var(--text3); }
</style>
</head>

<body>

<!-- RESUME -->
<section id="resume">
  <div class="sec-header">
    <div class="sec-num">06 / Resume</div>
    <h2>Full <span class="dim">resume</span></h2>
  </div>

  <!-- CLEAN PROFESSIONAL RESUME BLOCK (FIXED) -->
  <div style="border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface);">

    <div style="padding: 14px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);">
      <span style="font-size:11px; color:var(--text3); letter-spacing:.1em;">
        TYSON-ATKINSON-RESUME.PDF
      </span>

      <a href="TysonResumeA.pdf" target="_blank" class="btn btn-primary">
        Download Resume
      </a>
    </div>

    <!-- CLEAN PREVIEW (NO ACROBAT UI) -->
    <div style="padding: 70px 20px; text-align:center;">
      <div style="font-size:42px; margin-bottom:12px;">📄</div>
      <div style="color:var(--text2); margin-bottom:18px;">
        Resume preview available in new tab
      </div>

      <a href="TysonResumeA.pdf" target="_blank" class="btn">
        Open Full Resume →
      </a>
    </div>

  </div>
</section>

</body>
</html>
